server:
  port: 8030


spring:
  datasource:
    url:  jdbc:mysql://192.168.3.17:3306/mchi?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
#  main:
#    allow-bean-definition-overriding: true
#  cloud:
#    inetutils:
#      preferred-networks: 192.168.3
#    nacos:
#      discovery:
#        server-addr: 192.168.3.17:8848
#      config:
#        server-addr: 192.168.3.17:8848
  redis:
    host: 192.168.3.17  # Redis服务器地址
    port: 6379          # Redis端口
    password:          # Redis密码（如果有）
    database: 0         # Redis数据库索引
    timeout: 3000ms    # 连接超时时间
    lettuce:
      pool:
        max-active: 8   # 连接池最大连接数
        max-wait: -1ms  # 连接池最大阻塞等待时间
        max-idle: 8     # 连接池中的最大空闲连接
        min-idle: 0     # 连接池中的最小空闲连接

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB   # 单文件最大100MB
      max-request-size: 100MB # 单次请求最大100MB
      file-size-threshold: 2KB # 超过2KB写入临时文件




mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
  global-config:
    db-config:
      insert-strategy: not_null
      update-strategy: not_null


# RestTemplate配置
rest:
  template:
    connect-timeout: 3000
    read-timeout: 5000



# 报告文件存储配置
file:
  storage:
    wuChuangRoot: D:/service/BGI/ReportFile/WuChuangReport/
    kangYunRoot: D:/service/BGI/ReportFile/KangYunReport/

